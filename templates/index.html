<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-IDPS Live Security Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { margin: 0; color: #38bdf8; font-size: 24px; }
        .status-badge { background: #10b981; color: #fff; padding: 6px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #334155; }
        .card h3 { margin: 0 0 10px 0; color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
        .card .value { font-size: 36px; font-weight: bold; }
        .total { color: #38bdf8; }
        .normal { color: #10b981; }
        .threat { color: #ef4444; }
        .table-container { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
        h2 { margin-top: 0; font-size: 18px; color: #f1f5f9; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th, td { padding: 12px; border-bottom: 1px solid #334155; font-size: 14px; }
        th { color: #94a3b8; font-weight: 600; }
        .badge-high { background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 4px 8px; border-radius: 4px; font-weight: 600; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI-IDPS Core Monitoring Terminal</h1>
            <span class="status-badge">LIVE CAPTURE ACTIVE</span>
        </header>

        <div class="metrics-grid">
            <div class="card"><h3>Total Packets</h3><div id="total-packets" class="value total">0</div></div>
            <div class="card"><h3>Normal Traffic</h3><div id="normal-count" class="value normal">0</div></div>
            <div class="card"><h3>Threats Blocked</h3><div id="attack-count" class="value threat">0</div></div>
        </div>

        <div class="table-container">
            <h2>Recent Intrusion Anomalies Detected</h2>
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Source IP</th>
                        <th>Destination IP</th>
                        <th>Classification</th>
                        <th>Risk Level</th>
                    </tr>
                </thead>
                <tbody id="alerts-table">
                    <tr><td colspan="5" style="text-align: center; color: #64748b;">Awaiting intrusion signatures...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('total-packets').innerText = data.total_packets;
                document.getElementById('normal-count').innerText = data.normal_count;
                document.getElementById('attack-count').innerText = data.attack_count;
                
                const tableBody = document.getElementById('alerts-table');
                if (data.recent_alerts.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #64748b;">No malicious activity detected yet. System secure.</td></tr>';
                    return;
                }
                
                tableBody.innerHTML = data.recent_alerts.map(alert => `
                    <tr>
                        <td>${alert.timestamp}</td>
                        <td style="font-family: monospace; color: #f8fafc;">${alert.source_ip}</td>
                        <td style="font-family: monospace; color: #94a3b8;">${alert.dest_ip}</td>
                        <td style="color: #f43f5e; font-weight: 500;">${alert.threat_type}</td>
                        <td><span class="badge-high">${alert.risk_level}</span></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error("Dashboard synchronization error:", error);
            }
        }

        // Poll the server backend every 2 seconds for fresh dataset frames
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>
